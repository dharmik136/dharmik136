<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340" role="img" aria-label="Uttarayan kites rising on strings from a glowing home node in Gujarat, India (22.3N, 72.6E)">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/><stop offset="42%" stop-color="#5b21b6"/>
      <stop offset="74%" stop-color="#db2777"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fde68a"/><stop offset="55%" stop-color="#fbbf24" stop-opacity="0.7"/><stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/></radialGradient>
    <filter id="g2" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <g id="kite">
      <polygon points="0,-24 17,0 0,30 -17,0" fill="currentColor"/>
      <polygon points="0,-24 17,0 0,0 -17,0" fill="#ffffff" opacity="0.22"/>
      <path d="M0,-24 V30 M-17,0 H17" stroke="#0b1026" stroke-opacity="0.45" stroke-width="1.1"/>
      <path d="M0,30 q7,9 -4,15 q-11,6 3,13" stroke="currentColor" stroke-width="1.6" fill="none"/>
    </g>
  </defs>

  <rect width="560" height="340" rx="14" fill="url(#sky)"/>
  <circle cx="430" cy="250" r="120" fill="url(#sun)"/>

  <!-- stars -->
  <g fill="#fef9c3">
    <circle cx="70" cy="40" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="28" r="1.1"><animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="-3s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="50" r="1.2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.5s" begin="-2s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="36" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- manjha strings from rooftop node (110,286) to each kite; self-draw then hold -->
  <g stroke="#fde68a" stroke-opacity="0.5" stroke-width="0.9" fill="none">
    <path d="M110,286 Q 230,150 300,96" stroke-dasharray="300" stroke-dashoffset="240"><animate attributeName="stroke-dashoffset" from="300" to="0" dur="2s" begin="0.2s" fill="freeze"/></path>
    <path d="M110,286 Q 250,180 410,120" stroke-dasharray="360" stroke-dashoffset="290"><animate attributeName="stroke-dashoffset" from="360" to="0" dur="2.2s" begin="0.5s" fill="freeze"/></path>
    <path d="M110,286 Q 200,120 185,70" stroke-dasharray="300" stroke-dashoffset="240"><animate attributeName="stroke-dashoffset" from="300" to="0" dur="1.8s" begin="0.8s" fill="freeze"/></path>
  </g>

  <!-- kites (gentle sway) -->
  <g transform="translate(300,96)"><g><animateTransform attributeName="transform" type="rotate" values="-8;8;-8" dur="6s" repeatCount="indefinite"/><use href="#kite" color="#fb923c"/></g></g>
  <g transform="translate(410,120)"><g><animateTransform attributeName="transform" type="rotate" values="7;-9;7" dur="7s" repeatCount="indefinite"/><use href="#kite" color="#f472b6"/></g></g>
  <g transform="translate(185,70)"><g><animateTransform attributeName="transform" type="rotate" values="-6;9;-6" dur="5.4s" repeatCount="indefinite"/><use href="#kite" color="#2dd4bf"/></g></g>

  <!-- city silhouette -->
  <path d="M0,340 V300 H40 V282 H80 V300 H150 V270 H170 V300 H250 V288 H300 V300 H360 V276 H384 V300 H470 V292 H520 V300 H560 V340 Z" fill="#140e2e"/>

  <!-- rooftop home node -->
  <g transform="translate(110,286)">
    <circle r="5" fill="#f59e0b" filter="url(#g2)"/>
    <circle r="5" fill="none" stroke="#f59e0b" stroke-width="2"><animate attributeName="r" values="5;20;5" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.95;0;0.95" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <text x="110" y="320" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" letter-spacing="1.5" fill="#fde68a">GUJARAT &#183; 22.3&#176;N 72.6&#176;E</text>
</svg>
