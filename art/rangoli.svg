<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360" role="img" aria-label="Rangoli mandala — Gujarat folk art">
  <defs>
    <g id="petal"><ellipse cx="180" cy="74" rx="13" ry="36" fill="currentColor"/><circle cx="180" cy="36" r="7.5" fill="currentColor"/></g>
    <g id="leaf"><path d="M180,120 C166,150 166,156 180,182 C194,156 194,150 180,120 Z" fill="currentColor"/></g>
    <g id="dot"><circle cx="180" cy="22" r="4" fill="currentColor"/></g>
  </defs>

  <!-- outer ring of dots, slow spin -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="60s" repeatCount="indefinite"/>
    <use href="#dot" color="#f97316" transform="rotate(0 180 180)"/>
    <use href="#dot" color="#facc15" transform="rotate(22.5 180 180)"/>
    <use href="#dot" color="#ec4899" transform="rotate(45 180 180)"/>
    <use href="#dot" color="#14b8a6" transform="rotate(67.5 180 180)"/>
    <use href="#dot" color="#8b5cf6" transform="rotate(90 180 180)"/>
    <use href="#dot" color="#ef4444" transform="rotate(112.5 180 180)"/>
    <use href="#dot" color="#f97316" transform="rotate(135 180 180)"/>
    <use href="#dot" color="#facc15" transform="rotate(157.5 180 180)"/>
    <use href="#dot" color="#ec4899" transform="rotate(180 180 180)"/>
    <use href="#dot" color="#14b8a6" transform="rotate(202.5 180 180)"/>
    <use href="#dot" color="#8b5cf6" transform="rotate(225 180 180)"/>
    <use href="#dot" color="#ef4444" transform="rotate(247.5 180 180)"/>
    <use href="#dot" color="#f97316" transform="rotate(270 180 180)"/>
    <use href="#dot" color="#facc15" transform="rotate(292.5 180 180)"/>
    <use href="#dot" color="#ec4899" transform="rotate(315 180 180)"/>
    <use href="#dot" color="#14b8a6" transform="rotate(337.5 180 180)"/>
  </g>

  <!-- main petal ring, spin one way -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="46s" repeatCount="indefinite"/>
    <use href="#petal" color="#f97316" transform="rotate(0 180 180)"/>
    <use href="#petal" color="#ec4899" transform="rotate(30 180 180)"/>
    <use href="#petal" color="#facc15" transform="rotate(60 180 180)"/>
    <use href="#petal" color="#14b8a6" transform="rotate(90 180 180)"/>
    <use href="#petal" color="#8b5cf6" transform="rotate(120 180 180)"/>
    <use href="#petal" color="#ef4444" transform="rotate(150 180 180)"/>
    <use href="#petal" color="#f97316" transform="rotate(180 180 180)"/>
    <use href="#petal" color="#ec4899" transform="rotate(210 180 180)"/>
    <use href="#petal" color="#facc15" transform="rotate(240 180 180)"/>
    <use href="#petal" color="#14b8a6" transform="rotate(270 180 180)"/>
    <use href="#petal" color="#8b5cf6" transform="rotate(300 180 180)"/>
    <use href="#petal" color="#ef4444" transform="rotate(330 180 180)"/>
  </g>

  <!-- inner leaf ring, counter-spin -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 180 180" to="0 180 180" dur="34s" repeatCount="indefinite"/>
    <use href="#leaf" color="#fb7185" transform="rotate(15 180 180)"/>
    <use href="#leaf" color="#fbbf24" transform="rotate(45 180 180)"/>
    <use href="#leaf" color="#34d399" transform="rotate(75 180 180)"/>
    <use href="#leaf" color="#a78bfa" transform="rotate(105 180 180)"/>
    <use href="#leaf" color="#fb7185" transform="rotate(135 180 180)"/>
    <use href="#leaf" color="#fbbf24" transform="rotate(165 180 180)"/>
    <use href="#leaf" color="#34d399" transform="rotate(195 180 180)"/>
    <use href="#leaf" color="#a78bfa" transform="rotate(225 180 180)"/>
    <use href="#leaf" color="#fb7185" transform="rotate(255 180 180)"/>
    <use href="#leaf" color="#fbbf24" transform="rotate(285 180 180)"/>
    <use href="#leaf" color="#34d399" transform="rotate(315 180 180)"/>
    <use href="#leaf" color="#a78bfa" transform="rotate(345 180 180)"/>
  </g>

  <!-- center flower -->
  <circle cx="180" cy="180" r="38" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3 6"/>
  <circle cx="180" cy="180" r="26" fill="#f97316"/>
  <circle cx="180" cy="180" r="16" fill="#facc15"/>
  <circle cx="180" cy="180" r="7" fill="#ef4444"/>
</svg>
