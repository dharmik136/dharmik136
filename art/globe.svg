<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440" width="480" height="440" role="img" aria-label="Particle gradient globe — based in Gujarat, India">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="33%" r="78%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="76%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0a1029"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="62%" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.16"/>
    </radialGradient>
    <radialGradient id="pTeal"><stop offset="0%" stop-color="#ccfbf1"/><stop offset="100%" stop-color="#2dd4bf"/></radialGradient>
    <radialGradient id="pViolet"><stop offset="0%" stop-color="#f5d0fe"/><stop offset="100%" stop-color="#a855f7"/></radialGradient>
    <radialGradient id="pAmber"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#f59e0b"/></radialGradient>
    <radialGradient id="pBlue"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#3b82f6"/></radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><circle cx="240" cy="220" r="120"/></clipPath>
  </defs>

  <circle cx="240" cy="220" r="156" fill="url(#halo)"/>

  <!-- orbits behind the sphere -->
  <g opacity="0.45">
    <g transform="rotate(22 240 220)">
      <circle r="3" fill="url(#pTeal)"><animateMotion dur="11s" repeatCount="indefinite" begin="-2s" path="M 78,220 a 162,55 0 1,0 324,0 a 162,55 0 1,0 -324,0"/></circle>
      <circle r="2.3" fill="url(#pViolet)"><animateMotion dur="11s" repeatCount="indefinite" begin="-7.4s" path="M 78,220 a 162,55 0 1,0 324,0 a 162,55 0 1,0 -324,0"/></circle>
    </g>
    <g transform="rotate(-66 240 220)">
      <circle r="2.6" fill="url(#pBlue)"><animateMotion dur="13s" repeatCount="indefinite" begin="-5s" path="M 96,220 a 144,152 0 1,0 288,0 a 144,152 0 1,0 -288,0"/></circle>
    </g>
  </g>

  <!-- the planet -->
  <circle cx="240" cy="220" r="120" fill="url(#sphere)"/>
  <ellipse cx="201" cy="178" rx="46" ry="30" fill="#ffffff" opacity="0.10"/>

  <!-- wireframe (latitudes static, longitudes sweep to simulate rotation) -->
  <g clip-path="url(#clip)" fill="none" stroke="#7dd3fc" stroke-opacity="0.30" stroke-width="1">
    <circle cx="240" cy="220" r="120" stroke-opacity="0.5"/>
    <ellipse cx="240" cy="220" rx="120" ry="40"/>
    <ellipse cx="240" cy="164" rx="99" ry="25"/>
    <ellipse cx="240" cy="276" rx="99" ry="25"/>
    <ellipse cx="240" cy="220" ry="120" rx="116"><animate attributeName="rx" values="116;6;116" dur="15s" repeatCount="indefinite"/></ellipse>
    <ellipse cx="240" cy="220" ry="120" rx="72"><animate attributeName="rx" values="72;116;6;72" dur="15s" repeatCount="indefinite"/></ellipse>
    <ellipse cx="240" cy="220" ry="120" rx="28"><animate attributeName="rx" values="28;92;116;58;28" dur="15s" repeatCount="indefinite"/></ellipse>
  </g>

  <!-- Gujarat pin -->
  <g transform="translate(298,150)">
    <circle r="4.5" fill="#f59e0b" filter="url(#glow)"/>
    <circle r="4.5" fill="none" stroke="#f59e0b" stroke-width="2">
      <animate attributeName="r" values="4.5;19;4.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.95;0;0.95" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- orbits in front of the sphere -->
  <g>
    <g transform="rotate(22 240 220)">
      <circle r="3.4" fill="url(#pAmber)" filter="url(#glow)"><animateMotion dur="11s" repeatCount="indefinite" begin="-9s" path="M 78,220 a 162,55 0 1,0 324,0 a 162,55 0 1,0 -324,0"/></circle>
      <circle r="2.8" fill="url(#pTeal)" filter="url(#glow)"><animateMotion dur="11s" repeatCount="indefinite" begin="-4.6s" path="M 78,220 a 162,55 0 1,0 324,0 a 162,55 0 1,0 -324,0"/></circle>
    </g>
    <g transform="rotate(-66 240 220)">
      <circle r="3" fill="url(#pViolet)" filter="url(#glow)"><animateMotion dur="13s" repeatCount="indefinite" begin="-10.5s" path="M 96,220 a 144,152 0 1,0 288,0 a 144,152 0 1,0 -288,0"/></circle>
      <circle r="2.4" fill="url(#pBlue)" filter="url(#glow)"><animateMotion dur="13s" repeatCount="indefinite" begin="-1.5s" path="M 96,220 a 144,152 0 1,0 288,0 a 144,152 0 1,0 -288,0"/></circle>
    </g>
  </g>
</svg>
