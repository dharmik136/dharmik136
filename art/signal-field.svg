<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 410" width="820" height="410" role="img" aria-label="The operations surface I steward: ObserveOps (APM, RUM, SLO, Logs, Network, NCCM, Hybrid Infra) and ServiceOps (Service Management, ITAM/CMDB, Patch Management, Agentic AI, MSP) — 2 product lines, 12 modules, telemetry flowing into two cores.">
  <defs>
    <filter id="gf" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="cObs" cx="50%" cy="42%" r="60%"><stop offset="0%" stop-color="#7dd3fc"/><stop offset="55%" stop-color="#2563eb"/><stop offset="100%" stop-color="#0b2a6b"/></radialGradient>
    <radialGradient id="cSvc" cx="50%" cy="42%" r="60%"><stop offset="0%" stop-color="#86efac"/><stop offset="55%" stop-color="#22c55e"/><stop offset="100%" stop-color="#0b5132"/></radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.1" fill="#141d2e"/></pattern>
  </defs>

  <rect width="820" height="410" rx="16" fill="#0b0f17" stroke="#1f2a3a"/>
  <rect width="820" height="410" rx="16" fill="url(#dots)" opacity="0.6"/>
  <text x="28" y="34" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" letter-spacing="3" fill="#3f5168">SIGNAL FIELD // 2 lines &#183; 12 modules &#183; one operations story</text>

  <!-- center bridge -->
  <line x1="288" y1="205" x2="542" y2="205" stroke="#233" stroke-width="1.5" stroke-dasharray="3 7"/>

  <!-- WIRES -->
  <g stroke="#1c5a8a" stroke-opacity="0.5" stroke-width="1.2" fill="none">
    <path d="M255,205 L95,60"/><path d="M255,205 L72,108"/><path d="M255,205 L60,158"/><path d="M255,205 L60,210"/><path d="M255,205 L66,262"/><path d="M255,205 L84,314"/><path d="M255,205 L114,360"/>
  </g>
  <g stroke="#1c7a4a" stroke-opacity="0.5" stroke-width="1.2" fill="none">
    <path d="M575,205 L718,96"/><path d="M575,205 L748,152"/><path d="M575,205 L756,208"/><path d="M575,205 L744,266"/><path d="M575,205 L716,320"/>
  </g>

  <!-- telemetry pulses flowing inward -->
  <g>
    <circle r="3" fill="#38bdf8" filter="url(#gf)"><animateMotion dur="3.2s" repeatCount="indefinite" begin="-0.2s" keyPoints="0;1" keyTimes="0;1" path="M95,60 L255,205"/></circle>
    <circle r="3" fill="#38bdf8" filter="url(#gf)"><animateMotion dur="3.6s" repeatCount="indefinite" begin="-1.4s" keyPoints="0;1" keyTimes="0;1" path="M60,158 L255,205"/></circle>
    <circle r="3" fill="#38bdf8" filter="url(#gf)"><animateMotion dur="3.4s" repeatCount="indefinite" begin="-2.3s" keyPoints="0;1" keyTimes="0;1" path="M66,262 L255,205"/></circle>
    <circle r="3" fill="#38bdf8" filter="url(#gf)"><animateMotion dur="3.8s" repeatCount="indefinite" begin="-0.9s" keyPoints="0;1" keyTimes="0;1" path="M114,360 L255,205"/></circle>
    <circle r="3" fill="#4ade80" filter="url(#gf)"><animateMotion dur="3.3s" repeatCount="indefinite" begin="-1.1s" keyPoints="0;1" keyTimes="0;1" path="M718,96 L575,205"/></circle>
    <circle r="3" fill="#4ade80" filter="url(#gf)"><animateMotion dur="3.7s" repeatCount="indefinite" begin="-2.0s" keyPoints="0;1" keyTimes="0;1" path="M756,208 L575,205"/></circle>
    <circle r="3" fill="#f59e0b" filter="url(#gf)"><animateMotion dur="3.5s" repeatCount="indefinite" begin="-0.5s" keyPoints="0;1" keyTimes="0;1" path="M744,266 L575,205"/></circle>
  </g>

  <!-- CORES -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle">
    <circle cx="255" cy="205" r="30" fill="url(#cObs)" filter="url(#gf)"><animate attributeName="r" values="28;33;28" dur="4s" repeatCount="indefinite"/></circle>
    <text x="255" y="208" font-size="11" font-weight="700" fill="#eaf6ff">OBSERVE</text><text x="255" y="221" font-size="11" font-weight="700" fill="#eaf6ff">OPS</text>
    <circle cx="575" cy="205" r="30" fill="url(#cSvc)" filter="url(#gf)"><animate attributeName="r" values="33;28;33" dur="4s" repeatCount="indefinite"/></circle>
    <text x="575" y="208" font-size="11" font-weight="700" fill="#ebfff2">SERVICE</text><text x="575" y="221" font-size="11" font-weight="700" fill="#ebfff2">OPS</text>
  </g>

  <!-- MODULE CHIPS -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" text-anchor="middle">
    <g fill="#cfe3ff">
      <g transform="translate(95,60)"><rect x="-38" y="-12" width="76" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">APM</text></g>
      <g transform="translate(72,108)"><rect x="-38" y="-12" width="76" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">RUM</text></g>
      <g transform="translate(60,158)"><rect x="-38" y="-12" width="76" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">SLO</text></g>
      <g transform="translate(60,210)"><rect x="-40" y="-12" width="80" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">Logs</text></g>
      <g transform="translate(66,262)"><rect x="-44" y="-12" width="88" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">Network</text></g>
      <g transform="translate(84,314)"><rect x="-40" y="-12" width="80" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">NCCM</text></g>
      <g transform="translate(114,360)"><rect x="-54" y="-12" width="108" height="24" rx="7" fill="#0f1626" stroke="#1c5a8a"/><text y="4">Hybrid Infra</text></g>
    </g>
    <g fill="#cdf6dd">
      <g transform="translate(718,96)"><rect x="-58" y="-12" width="116" height="24" rx="7" fill="#0f1626" stroke="#1c7a4a"/><text y="4">Service Mgmt</text></g>
      <g transform="translate(748,152)"><rect x="-54" y="-12" width="108" height="24" rx="7" fill="#0f1626" stroke="#1c7a4a"/><text y="4">ITAM / CMDB</text></g>
      <g transform="translate(756,208)"><rect x="-52" y="-12" width="104" height="24" rx="7" fill="#0f1626" stroke="#1c7a4a"/><text y="4">Patch Mgmt</text></g>
      <g transform="translate(744,266)"><rect x="-50" y="-12" width="100" height="24" rx="7" fill="#0f1626" stroke="#b45309"/><text y="4" fill="#fde68a">Agentic AI</text>
        <circle cx="50" cy="0" r="4" fill="none" stroke="#f59e0b" stroke-width="1.5"><animate attributeName="r" values="4;13;4" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0;0.9" dur="2.6s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(716,320)"><rect x="-52" y="-12" width="104" height="24" rx="7" fill="#0f1626" stroke="#1c7a4a"/><text y="4">MSP Edition</text></g>
    </g>
  </g>
</svg>
