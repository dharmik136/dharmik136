<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" width="380" height="360" role="img" aria-label="A sikku kolam drawn as one unbroken twelve-point line around a grid of dots — no loose ends.">
  <defs>
    <filter id="kg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="kline" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2dd4bf"/><stop offset="50%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
  </defs>

  <!-- pulli (dot grid the line weaves around) -->
  <g fill="#475569">
    <circle cx="190" cy="45" r="2.6"/><circle cx="255" cy="62.4" r="2.6"/><circle cx="302.6" cy="110" r="2.6"/><circle cx="320" cy="175" r="2.6"/>
    <circle cx="302.6" cy="240" r="2.6"/><circle cx="255" cy="287.6" r="2.6"/><circle cx="190" cy="305" r="2.6"/><circle cx="125" cy="287.6" r="2.6"/>
    <circle cx="77.4" cy="240" r="2.6"/><circle cx="60" cy="175" r="2.6"/><circle cx="77.4" cy="110" r="2.6"/><circle cx="125" cy="62.4" r="2.6"/>
    <circle cx="190" cy="175" r="2.6"/>
  </g>

  <!-- one continuous {12/5} knot: glow underlay + drawn-on stroke -->
  <path d="M190,45 L255,287.6 L77.4,110 L320,175 L77.4,240 L255,62.4 L190,305 L125,62.4 L302.6,240 L60,175 L302.6,110 L125,287.6 Z" fill="none" stroke="url(#kline)" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.16" filter="url(#kg)"/>
  <path d="M190,45 L255,287.6 L77.4,110 L320,175 L77.4,240 L255,62.4 L190,305 L125,62.4 L302.6,240 L60,175 L302.6,110 L125,287.6 Z" fill="none" stroke="url(#kline)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="3300" stroke-dashoffset="3040">
    <animate attributeName="stroke-dashoffset" from="3040" to="0" dur="3.6s" begin="0.2s" fill="freeze"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="5s" begin="3.8s" repeatCount="indefinite"/>
  </path>

  <!-- center flower -->
  <circle cx="190" cy="175" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="2 5"/>
  <circle cx="190" cy="175" r="11" fill="#0b0f17" stroke="#2dd4bf" stroke-width="1.5"/>
  <circle cx="190" cy="175" r="4.5" fill="#f59e0b" filter="url(#kg)"/>
</svg>
