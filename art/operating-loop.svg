<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320" role="img" aria-label="Operating model: three principles power a continuous loop — decide what to defend first then write; specificity is the only luxury that scales; build the small tool when none exists. The loop: Defend, Write, Ship, Measure.">
  <defs>
    <filter id="lg" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="ld" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.1" fill="#141d2e"/></pattern>
  </defs>
  <rect width="820" height="320" rx="16" fill="#0b0f17" stroke="#1f2a3a"/>
  <rect width="820" height="320" rx="16" fill="url(#ld)" opacity="0.6"/>
  <text x="28" y="34" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" letter-spacing="3" fill="#3f5168">OPERATING MODEL // principles power the loop</text>

  <!-- decision stack -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <g transform="translate(40,86)">
      <text x="0" y="0" font-size="26" font-weight="800" fill="#2EC4B6">01<animate attributeName="opacity" values="0.4;1;0.4" dur="6s" begin="-3s" repeatCount="indefinite"/></text>
      <text x="48" y="-4" font-size="15" font-weight="700" fill="#e6edf3">Decide what to defend first; write second.</text>
      <text x="48" y="15" font-size="11.5" fill="#6e7e94">Most B2B content drifts because nobody decided what to defend.</text>
    </g>
    <g transform="translate(40,156)">
      <text x="0" y="0" font-size="26" font-weight="800" fill="#2EC4B6">02<animate attributeName="opacity" values="0.4;1;0.4" dur="6s" begin="-1s" repeatCount="indefinite"/></text>
      <text x="48" y="-4" font-size="15" font-weight="700" fill="#e6edf3">Specificity is the only luxury that scales.</text>
      <text x="48" y="15" font-size="11.5" fill="#6e7e94">Sharp positioning beats decorative writing, every time.</text>
    </g>
    <g transform="translate(40,226)">
      <text x="0" y="0" font-size="26" font-weight="800" fill="#2EC4B6">03<animate attributeName="opacity" values="0.4;1;0.4" dur="6s" begin="-5s" repeatCount="indefinite"/></text>
      <text x="48" y="-4" font-size="15" font-weight="700" fill="#e6edf3">Build the small tool when none exists.</text>
      <text x="48" y="15" font-size="11.5" fill="#6e7e94">The smaller, the better.</text>
    </g>
  </g>

  <!-- connector -->
  <path d="M470,160 H540" stroke="#2EC4B6" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="3 5"/>
  <text x="476" y="152" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="1.5" fill="#3f5168">POWER</text>

  <!-- the loop -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle">
    <circle cx="632" cy="170" r="86" fill="none" stroke="#1f3147" stroke-width="2"/>
    <path id="ring" d="M632,84 A86,86 0 0,1 718,170 A86,86 0 0,1 632,256 A86,86 0 0,1 546,170 A86,86 0 0,1 632,84" fill="none"/>
    <text x="632" y="174" font-size="10" letter-spacing="2" fill="#3f5168">THE LOOP</text>

    <!-- nodes: base + pulsing glow ring -->
    <g>
      <circle cx="632" cy="84" r="9" fill="#2563eb"/><circle cx="632" cy="84" r="9" fill="none" stroke="#60a5fa" stroke-width="2.5"><animate attributeName="opacity" values="1;0.15;0.15;1" keyTimes="0;0.08;0.9;1" dur="8s" repeatCount="indefinite"/></circle>
      <text x="632" y="64" font-size="12" font-weight="700" fill="#cfe3ff">DEFEND</text>
      <circle cx="718" cy="170" r="9" fill="#22c55e"/><circle cx="718" cy="170" r="9" fill="none" stroke="#86efac" stroke-width="2.5"><animate attributeName="opacity" values="0.15;0.15;1;0.15;0.15" keyTimes="0;0.18;0.27;0.36;1" dur="8s" repeatCount="indefinite"/></circle>
      <text x="718" y="150" font-size="12" font-weight="700" fill="#cdf6dd">WRITE</text>
      <circle cx="632" cy="256" r="9" fill="#f59e0b"/><circle cx="632" cy="256" r="9" fill="none" stroke="#fcd34d" stroke-width="2.5"><animate attributeName="opacity" values="0.15;0.15;1;0.15;0.15" keyTimes="0;0.42;0.52;0.6;1" dur="8s" repeatCount="indefinite"/></circle>
      <text x="632" y="282" font-size="12" font-weight="700" fill="#fde68a">SHIP</text>
      <circle cx="546" cy="170" r="9" fill="#a855f7"/><circle cx="546" cy="170" r="9" fill="none" stroke="#d8b4fe" stroke-width="2.5"><animate attributeName="opacity" values="0.15;0.15;1;0.15;0.15" keyTimes="0;0.68;0.77;0.85;1" dur="8s" repeatCount="indefinite"/></circle>
      <text x="546" y="150" font-size="12" font-weight="700" fill="#e9d5ff">MEASURE</text>
    </g>
    <circle r="5" fill="#2EC4B6" filter="url(#lg)"><animateMotion dur="8s" repeatCount="indefinite"><mpath href="#ring"/></animateMotion></circle>
  </g>
</svg>
