<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="motadata-page-builder. Problem: scope drift. Defended: every claim approved, every page in-boundary. Outcome: publish-ready, on-scope.">
  <rect width="400" height="220" rx="14" fill="#0b0f17" stroke="#1f2a3a"/>
  <text x="20" y="32" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#4ade80">motadata-page-builder</text>
  <text x="20" y="50" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="1" fill="#3f5168">CLAIMS &#183; BOUNDARY CHECK</text>

  <!-- claim chips ticking to teal, one amber boundary flag -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
    <g transform="translate(24,72)"><rect width="150" height="22" rx="6" fill="#0f1626" stroke="#1c7a4a"/><rect x="6" y="6" width="10" height="10" rx="2" fill="#22c55e"><animate attributeName="opacity" values="0.2;1;1" keyTimes="0;0.2;1" dur="3s" repeatCount="indefinite"/></rect><text x="24" y="15" fill="#cdf6dd">claim approved</text></g>
    <g transform="translate(24,100)"><rect width="150" height="22" rx="6" fill="#0f1626" stroke="#1c7a4a"/><rect x="6" y="6" width="10" height="10" rx="2" fill="#22c55e"><animate attributeName="opacity" values="0.2;0.2;1;1" keyTimes="0;0.25;0.45;1" dur="3s" repeatCount="indefinite"/></rect><text x="24" y="15" fill="#cdf6dd">claim approved</text></g>
    <g transform="translate(24,128)"><rect width="150" height="22" rx="6" fill="#1a1206" stroke="#b45309"/><text x="6" y="15" fill="#f59e0b">&#9873;</text><text x="24" y="15" fill="#fde68a">boundary flag</text></g>
    <g transform="translate(24,156)"><rect width="150" height="22" rx="6" fill="#0f1626" stroke="#1c7a4a"/><rect x="6" y="6" width="10" height="10" rx="2" fill="#22c55e"><animate attributeName="opacity" values="0.2;0.2;0.2;1;1" keyTimes="0;0.5;0.7;0.8;1" dur="3s" repeatCount="indefinite"/></rect><text x="24" y="15" fill="#cdf6dd">claim approved</text></g>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
    <text x="200" y="86" fill="#6e7e94">PROBLEM</text><text x="200" y="101" fill="#c9d1d9">scope drift</text>
    <text x="200" y="126" fill="#6e7e94">DEFENDED</text><text x="200" y="141" fill="#c9d1d9">claims approved, in-boundary</text>
    <text x="200" y="166" fill="#6e7e94">OUTCOME</text><text x="200" y="181" fill="#4ade80">publish-ready, on-scope</text>
  </g>
</svg>
