<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="home-loan-planner. Problem: prepayment math is opaque. Defended: clarity over a spreadsheet. Outcome: a decision, not a number.">
  <rect width="400" height="220" rx="14" fill="#0b0f17" stroke="#1f2a3a"/>
  <text x="20" y="32" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#2dd4bf">home-loan-planner</text>
  <text x="20" y="50" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="1" fill="#3f5168">PREPAYMENT &#183; INTEREST SAVED</text>

  <!-- shrinking interest bars -> verdict -->
  <g>
    <rect x="30" y="70" width="20" height="90" fill="#f59e0b" opacity="0.85"><animate attributeName="height" values="90;52" dur="3s" begin="-0.1s" repeatCount="indefinite"/><animate attributeName="y" values="70;108" dur="3s" begin="-0.1s" repeatCount="indefinite"/></rect>
    <rect x="58" y="70" width="20" height="90" fill="#f59e0b" opacity="0.8"><animate attributeName="height" values="90;44" dur="3s" begin="-0.4s" repeatCount="indefinite"/><animate attributeName="y" values="70;116" dur="3s" begin="-0.4s" repeatCount="indefinite"/></rect>
    <rect x="86" y="70" width="20" height="90" fill="#f59e0b" opacity="0.75"><animate attributeName="height" values="90;36" dur="3s" begin="-0.7s" repeatCount="indefinite"/><animate attributeName="y" values="70;124" dur="3s" begin="-0.7s" repeatCount="indefinite"/></rect>
    <rect x="114" y="70" width="20" height="90" fill="#f59e0b" opacity="0.7"><animate attributeName="height" values="90;28" dur="3s" begin="-1s" repeatCount="indefinite"/><animate attributeName="y" values="70;132" dur="3s" begin="-1s" repeatCount="indefinite"/></rect>
    <rect x="146" y="78" width="22" height="82" rx="3" fill="#22c55e"/><text x="157" y="70" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#86efac">saved</text>
    <line x1="26" y1="160" x2="172" y2="160" stroke="#27425e"/>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
    <text x="200" y="86" fill="#6e7e94">PROBLEM</text><text x="200" y="101" fill="#c9d1d9">prepayment math is opaque</text>
    <text x="200" y="126" fill="#6e7e94">DEFENDED</text><text x="200" y="141" fill="#c9d1d9">clarity over a spreadsheet</text>
    <text x="200" y="166" fill="#6e7e94">OUTCOME</text><text x="200" y="181" fill="#2dd4bf">a decision, not a number</text>
  </g>
</svg>
